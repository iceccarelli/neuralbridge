title: "Welcome to NeuralBridge Discussions!"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Welcome to the NeuralBridge community! This is the place to ask questions, share ideas, and connect with other users and contributors.

        **Discussion Categories:**
        - **Q&A**: Ask questions about using NeuralBridge.
        - **Ideas**: Propose new features or adapters.
        - **Show and Tell**: Share what you've built with NeuralBridge.
        - **General**: Everything else.
