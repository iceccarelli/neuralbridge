name: Feature Request
description: Suggest a new feature or adapter for NeuralBridge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love hearing new ideas! Please describe the feature you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Adapter
        - Security
        - Compliance
        - Dashboard
        - Performance
        - Documentation
        - Other
    validations:
      required: true
