site_name: NeuralBridge
site_url: https://iceccarelli.github.io/neuralbridge/
site_description: Universal Enterprise Middleware for Agentic AI Integration.
site_author: NeuralBridge Contributors

# Repository
repo_name: iceccarelli/neuralbridge
repo_url: https://github.com/iceccarelli/neuralbridge
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 NeuralBridge Contributors

# Theme
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  palette:
    # Palette toggle for light vs dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: yes
            show_source: no

# Navigation
nav:
  - Home: index.md
  - Introduction: introduction.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Adapters:
    - Overview: adapters/index.md
    - Databases: adapters/databases.md
    - APIs: adapters/apis.md
    - Messaging: adapters/messaging.md
    - Cloud: adapters/cloud.md
    - Custom: adapters/custom.md
  - Security:
    - Overview: security/index.md
    - Sandboxing: security/sandboxing.md
    - Compliance (CRA/GDPR): security/compliance.md
  - API Reference: api-reference.md
  - Dashboard: dashboard.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
