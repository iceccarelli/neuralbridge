# NeuralBridge Helm Chart — Default Values

replicaCount: 3

image:
  repository: ghcr.io/your-org/neuralbridge
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: neuralbridge.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: neuralbridge-tls
      hosts:
        - neuralbridge.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

postgresql:
  enabled: true
  auth:
    database: neuralbridge

redis:
  enabled: true
  architecture: standalone

env:
  NEURALBRIDGE_ENV: production
